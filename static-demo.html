<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>校园车辆与车牌检测系统 - 静态演示版</title>
    <style>
      :root {
        --bg: #eef2f6;
        --panel: #ffffff;
        --ink: #17202a;
        --muted: #667085;
        --line: #d8e0ea;
        --blue: #2563eb;
        --green: #16865b;
        --orange: #ea7a24;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
        color: var(--ink);
        background:
          linear-gradient(135deg, rgba(37, 99, 235, 0.13), transparent 34%),
          linear-gradient(225deg, rgba(22, 134, 91, 0.14), transparent 34%),
          var(--bg);
      }

      .app {
        width: min(1260px, calc(100vw - 32px));
        margin: 24px auto;
        display: grid;
        grid-template-columns: minmax(0, 1fr) 350px;
        gap: 18px;
      }

      .panel {
        background: rgba(255, 255, 255, 0.94);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: 0 18px 44px rgba(18, 28, 45, 0.12);
      }

      .main {
        padding: 24px;
      }

      .top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
      }

      .eyebrow {
        margin: 0 0 8px;
        color: var(--green);
        font-size: 13px;
        font-weight: 800;
      }

      h1,
      h2,
      h3,
      p {
        margin-top: 0;
      }

      h1 {
        margin-bottom: 6px;
        font-size: 30px;
        line-height: 1.18;
      }

      .sub {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
      }

      .badge {
        flex: 0 0 auto;
        max-width: 180px;
        padding: 8px 12px;
        border-radius: 999px;
        background: #e4f6ee;
        color: #126343;
        font-size: 13px;
        font-weight: 800;
        text-align: center;
      }

      .drop {
        min-height: 140px;
        display: grid;
        place-items: center;
        gap: 8px;
        border: 2px dashed #aab8ca;
        border-radius: 8px;
        background: #f8fafc;
        text-align: center;
        cursor: pointer;
      }

      .drop:hover,
      .drop.dragging {
        border-color: var(--blue);
        background: #edf5ff;
      }

      .drop input {
        display: none;
      }

      .plus {
        width: 42px;
        height: 42px;
        display: grid;
        place-items: center;
        border-radius: 50%;
        background: var(--blue);
        color: white;
        font-size: 30px;
        line-height: 1;
      }

      .actions {
        display: flex;
        gap: 12px;
        margin: 18px 0;
      }

      button {
        height: 42px;
        padding: 0 18px;
        border: 0;
        border-radius: 6px;
        color: white;
        background: var(--blue);
        font-weight: 800;
        cursor: pointer;
      }

      button.secondary {
        color: var(--ink);
        background: #e6edf5;
      }

      .viewer {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }

      figure {
        margin: 0;
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
        background: #101820;
      }

      figcaption {
        padding: 10px 12px;
        background: #f8fafc;
        border-bottom: 1px solid var(--line);
        color: var(--muted);
        font-size: 14px;
        font-weight: 800;
      }

      canvas,
      img {
        width: 100%;
        height: 420px;
        display: block;
        object-fit: contain;
      }

      img:not([src]) {
        display: none;
      }

      .side {
        padding: 22px;
        align-self: start;
      }

      .metrics {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-bottom: 20px;
      }

      .metric {
        padding: 14px 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #f8fafc;
      }

      .metric strong {
        display: block;
        color: var(--orange);
        font-size: 24px;
      }

      .metric span {
        color: var(--muted);
        font-size: 12px;
      }

      .list,
      .plates {
        display: grid;
        gap: 10px;
      }

      .item {
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fbfcfe;
      }

      .item strong,
      .item span,
      .item small {
        display: block;
      }

      .item span {
        margin-top: 5px;
        color: var(--green);
        font-weight: 800;
      }

      .item small {
        margin-top: 4px;
        color: var(--muted);
      }

      .empty {
        min-height: 62px;
        display: grid;
        place-items: center;
        border: 1px dashed var(--line);
        border-radius: 8px;
        color: var(--muted);
        background: #f8fafc;
        font-size: 14px;
      }

      .plates:not(.empty) {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .plates canvas {
        height: auto;
        aspect-ratio: 3 / 1;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #111827;
      }

      @media (max-width: 960px) {
        .app,
        .viewer {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="panel main">
        <div class="top">
          <div>
            <p class="eyebrow">Visual AI Course Project</p>
            <h1>校园车辆与车牌检测系统</h1>
            <p class="sub">静态演示版：直接打开 HTML 即可上传图片并生成检测展示。</p>
          </div>
          <span class="badge" id="mode">等待检测</span>
        </div>

        <label class="drop" id="drop">
          <input id="file" type="file" accept="image/*" />
          <span class="plus">+</span>
          <strong>上传车辆图片</strong>
          <small>浏览器本地处理，不需要启动服务器</small>
        </label>

        <div class="actions">
          <button id="detect">开始检测</button>
          <button id="reset" class="secondary">重新选择</button>
          <button id="download" class="secondary">保存结果图</button>
        </div>

        <div class="viewer">
          <figure>
            <figcaption>原始图片</figcaption>
            <img id="preview" alt="原始图片预览" />
          </figure>
          <figure>
            <figcaption>检测结果</figcaption>
            <canvas id="canvas"></canvas>
          </figure>
        </div>
      </section>

      <aside class="panel side">
        <h2>检测结果</h2>
        <div class="metrics">
          <div class="metric"><strong id="vehicles">0</strong><span>车辆数量</span></div>
          <div class="metric"><strong id="plates">0</strong><span>车牌数量</span></div>
          <div class="metric"><strong id="conf">0</strong><span>平均置信度</span></div>
        </div>

        <h3>目标明细</h3>
        <div class="list empty" id="list">暂无检测结果</div>

        <h3 style="margin-top: 20px">车牌裁剪</h3>
        <div class="plates empty" id="plateGallery">暂无车牌区域</div>
      </aside>
    </main>

    <script>
      const fileInput = document.querySelector("#file");
      const preview = document.querySelector("#preview");
      const canvas = document.querySelector("#canvas");
      const ctx = canvas.getContext("2d");
      const mode = document.querySelector("#mode");
      const list = document.querySelector("#list");
      const gallery = document.querySelector("#plateGallery");
      const vehiclesEl = document.querySelector("#vehicles");
      const platesEl = document.querySelector("#plates");
      const confEl = document.querySelector("#conf");
      const drop = document.querySelector("#drop");

      let img = new Image();
      let ready = false;

      fileInput.addEventListener("change", () => loadFile(fileInput.files[0]));
      drop.addEventListener("dragover", (event) => {
        event.preventDefault();
        drop.classList.add("dragging");
      });
      drop.addEventListener("dragleave", () => drop.classList.remove("dragging"));
      drop.addEventListener("drop", (event) => {
        event.preventDefault();
        drop.classList.remove("dragging");
        loadFile(event.dataTransfer.files[0]);
      });

      document.querySelector("#detect").addEventListener("click", runDetect);
      document.querySelector("#reset").addEventListener("click", reset);
      document.querySelector("#download").addEventListener("click", () => {
        if (!ready) return;
        const link = document.createElement("a");
        link.download = "campus-vehicle-detection-result.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
      });

      function loadFile(file) {
        if (!file) return;
        const url = URL.createObjectURL(file);
        preview.src = url;
        img = new Image();
        img.onload = () => {
          ready = true;
          canvas.width = img.naturalWidth;
          canvas.height = img.naturalHeight;
          ctx.drawImage(img, 0, 0);
          mode.textContent = "图片已选择";
          clearStats();
        };
        img.src = url;
      }

      function runDetect() {
        if (!ready) {
          mode.textContent = "请先上传图片";
          return;
        }

        canvas.width = img.naturalWidth;
        canvas.height = img.naturalHeight;
        ctx.drawImage(img, 0, 0);

        const w = canvas.width;
        const h = canvas.height;
        const vehicleBox = [Math.round(w * 0.12), Math.round(h * 0.24), Math.round(w * 0.88), Math.round(h * 0.82)];
        const plateBox = [
          Math.round(w * 0.39),
          Math.round(h * 0.61),
          Math.round(w * 0.61),
          Math.round(h * 0.69),
        ];
        const detections = [
          { label: "车辆", confidence: 0.86, box: vehicleBox, color: "#16865b" },
          { label: "车牌", confidence: 0.82, box: plateBox, color: "#ea7a24" },
        ];

        detections.forEach(drawBox);
        renderStats(detections);
        cropPlate(plateBox);
        mode.textContent = "静态演示检测";
      }

      function drawBox(item) {
        const [x1, y1, x2, y2] = item.box;
        ctx.lineWidth = Math.max(3, Math.round(canvas.width / 260));
        ctx.strokeStyle = item.color;
        ctx.strokeRect(x1, y1, x2 - x1, y2 - y1);
        const text = `${item.label} ${item.confidence.toFixed(2)}`;
        ctx.font = `${Math.max(18, Math.round(canvas.width / 42))}px Microsoft YaHei, Arial`;
        const width = ctx.measureText(text).width + 18;
        const height = Math.max(30, Math.round(canvas.width / 30));
        ctx.fillStyle = item.color;
        ctx.fillRect(x1, Math.max(0, y1 - height), width, height);
        ctx.fillStyle = "#fff";
        ctx.fillText(text, x1 + 9, Math.max(22, y1 - 9));
      }

      function renderStats(items) {
        const vehicleCount = items.filter((item) => item.label === "车辆").length;
        const plateCount = items.filter((item) => item.label === "车牌").length;
        const avg = items.reduce((sum, item) => sum + item.confidence, 0) / items.length;
        vehiclesEl.textContent = vehicleCount;
        platesEl.textContent = plateCount;
        confEl.textContent = avg.toFixed(2);
        list.className = "list";
        list.innerHTML = items
          .map(
            (item, index) =>
              `<div class="item"><strong>${index + 1}. ${item.label}</strong><span>置信度 ${(item.confidence * 100).toFixed(1)}%</span><small>坐标 [${item.box.join(", ")}]</small></div>`,
          )
          .join("");
      }

      function cropPlate(box) {
        const [x1, y1, x2, y2] = box;
        const crop = document.createElement("canvas");
        crop.width = x2 - x1;
        crop.height = y2 - y1;
        crop.getContext("2d").drawImage(img, x1, y1, crop.width, crop.height, 0, 0, crop.width, crop.height);
        gallery.className = "plates";
        gallery.innerHTML = "";
        gallery.appendChild(crop);
      }

      function clearStats() {
        vehiclesEl.textContent = "0";
        platesEl.textContent = "0";
        confEl.textContent = "0";
        list.className = "list empty";
        list.textContent = "暂无检测结果";
        gallery.className = "plates empty";
        gallery.textContent = "暂无车牌区域";
      }

      function reset() {
        fileInput.value = "";
        preview.removeAttribute("src");
        ready = false;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        mode.textContent = "等待检测";
        clearStats();
      }
    </script>
  </body>
</html>
