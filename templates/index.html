<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>校园车辆与车牌检测系统</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="panel workspace">
        <div class="brand">
          <div>
            <p class="eyebrow">Visual AI Course Project</p>
            <h1>校园车辆与车牌检测系统</h1>
          </div>
          <span class="status" id="mode">等待检测</span>
        </div>

        <label class="dropzone" for="imageInput" id="dropzone">
          <input id="imageInput" type="file" accept="image/*" />
          <span class="upload-icon">+</span>
          <strong>上传车辆图片</strong>
          <small>系统会检测车辆和车牌区域，识别车牌号，并返回车辆图片</small>
        </label>

        <div class="actions">
          <button id="detectBtn" type="button">开始检测</button>
          <button id="resetBtn" type="button" class="secondary">重新选择</button>
        </div>

        <div class="preview-grid">
          <figure>
            <figcaption>原始图片</figcaption>
            <img id="originalPreview" alt="原始图片预览" />
          </figure>
          <figure>
            <figcaption>识别结果图</figcaption>
            <img id="resultPreview" alt="识别结果预览" />
          </figure>
        </div>
      </section>

      <aside class="panel insight">
        <h2>识别结果</h2>
        <div class="metrics">
          <div>
            <span id="vehicleCount">0</span>
            <p>车辆数量</p>
          </div>
          <div>
            <span id="plateCount">0</span>
            <p>车牌数量</p>
          </div>
          <div>
            <span id="avgConfidence">0</span>
            <p>平均置信度</p>
          </div>
        </div>

        <section class="result-card">
          <p>车牌号</p>
          <strong id="plateNumber">未识别</strong>
        </section>

        <section class="result-card">
          <p>车辆类型</p>
          <strong id="vehicleType">未知</strong>
        </section>

        <section class="list-section">
          <h3>目标明细</h3>
          <div id="detectionList" class="detection-list empty">暂无检测结果</div>
        </section>

        <section class="list-section">
          <h3>车辆图片</h3>
          <div id="vehicleGallery" class="vehicle-gallery empty">暂无车辆图片</div>
        </section>

        <section class="list-section">
          <h3>车牌裁剪</h3>
          <div id="plateGallery" class="plate-gallery empty">暂无车牌区域</div>
        </section>
      </aside>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
